name: CI Python

# 1. Déclencheur : Uniquement sur "push" vers la branche "main"
on:
  push:
    branches:
      - main

jobs:
  tests:
    # 2. Environnement : Ubuntu (dernière version)
    runs-on: ubuntu-latest

    # 3. Étapes du workflow
    steps:
      # Étape 3a : Récupérer le code
      - name: Checkout du code
        uses: actions/checkout@v3

      # Étape 3b : Installer Python 3.10
      - name: Configuration de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Étape 3c : Installer les dépendances
      # J'utilise echo ici pour simuler, mais tu peux enlever le "echo" et les guillemets si tu as un vrai fichier requirements.txt
      - name: Installation des dépendances
        run: echo "pip install -r requirements.txt"

      # Étape 3d : Lancer les tests
      # Idem, j'utilise echo pour simuler la commande pytest
      - name: Exécution des tests
        run: echo "Running tests avec pytest..."