name: variables.yml
on: push

jobs:
  mon-job:
    # On décale runs-on, env et steps pour les mettre dans "mon-job"
    runs-on: ubuntu-latest

    env:
      # On décale PRENOM pour le mettre dans "env"
      PRENOM: "Niels" # Remplacez par votre prénom

    steps:
      - name: Salutation personnalisée
        run: echo "Bonjour $PRENOM, bienvenue dans le module ICT324"